name: publish

on:
  workflow_run:
    workflows: ["bundle"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: install
        run: bun install --frozen-lockfile

      - name: build
        run: bun run build:pkg && bun run build:create

      - name: publish fromsrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish.mjs packages/fromsrc

      - name: publish create-fromsrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish.mjs packages/create-fromsrc

      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./package.json').version")
          target=$(git rev-parse HEAD)
          title="v$version"
          notes=$(cat <<EOF
          fromsrc $title

          published packages
          - fromsrc@$version
          - create-fromsrc@$version
          EOF
          )
          if gh release view "$title" >/dev/null 2>&1; then
            gh release edit "$title" --title "$title" --notes "$notes"
          else
            gh release create "$title" --target "$target" --title "$title" --notes "$notes"
          fi
